<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="35%" cy="35%">
      <stop offset="0%" stop-color="#2d3459"/>
      <stop offset="100%" stop-color="#1c2034"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#afb6d6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#afb6d6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- background -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- moon glow -->
  <circle cx="300" cy="170" r="110" fill="url(#glow)"/>
  <!-- moon -->
  <circle cx="300" cy="170" r="68" fill="#d4dbff" opacity="0.92"/>
  <!-- moon shadow (crescent) -->
  <circle cx="328" cy="158" r="56" fill="#2d3459"/>
  <!-- stars -->
  <circle cx="80"  cy="60"  r="2.2" fill="#d4dbff" opacity="0.9"/>
  <circle cx="140" cy="110" r="1.5" fill="#d4dbff" opacity="0.7"/>
  <circle cx="50"  cy="160" r="1.8" fill="#d4dbff" opacity="0.8"/>
  <circle cx="430" cy="50"  r="2.5" fill="#d4dbff" opacity="0.85"/>
  <circle cx="460" cy="130" r="1.5" fill="#d4dbff" opacity="0.6"/>
  <circle cx="390" cy="90"  r="1.8" fill="#d4dbff" opacity="0.75"/>
  <circle cx="170" cy="40"  r="1.5" fill="#d4dbff" opacity="0.7"/>
  <circle cx="100" cy="250" r="1.2" fill="#d4dbff" opacity="0.5"/>
  <circle cx="470" cy="260" r="1.8" fill="#d4dbff" opacity="0.65"/>
  <circle cx="30"  cy="300" r="1.5" fill="#d4dbff" opacity="0.6"/>
  <circle cx="420" cy="320" r="1.2" fill="#d4dbff" opacity="0.5"/>
  <circle cx="220" cy="80"  r="1.2" fill="#d4dbff" opacity="0.6"/>
  <!-- horizon mist -->
  <rect x="0" y="380" width="512" height="132" fill="#1c2034" opacity="0.7"/>
  <ellipse cx="256" cy="390" rx="280" ry="40" fill="#afb6d6" opacity="0.07"/>
</svg>
