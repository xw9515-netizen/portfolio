<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff4cc"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="45%">
      <stop offset="0%" stop-color="#ffcd4e"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </radialGradient>
  </defs>
  <!-- sky -->
  <rect width="512" height="512" fill="url(#sky)"/>
  <!-- sun glow -->
  <circle cx="256" cy="220" r="90" fill="#ffcd4e" opacity="0.25"/>
  <!-- sun -->
  <circle cx="256" cy="220" r="60" fill="url(#sun)"/>
  <!-- sea -->
  <rect x="0" y="340" width="512" height="172" fill="#7ec8d4" opacity="0.55"/>
  <!-- wave 1 -->
  <path d="M0 340 Q80 318 160 340 Q240 362 320 340 Q400 318 480 340 L512 340 L512 512 L0 512Z" fill="#5bb3c2" opacity="0.6"/>
  <!-- wave 2 -->
  <path d="M0 370 Q80 350 160 370 Q240 390 320 370 Q400 350 480 370 L512 370 L512 512 L0 512Z" fill="#3a9aad" opacity="0.5"/>
  <!-- sand -->
  <ellipse cx="256" cy="512" rx="320" ry="90" fill="#f5d08a" opacity="0.85"/>
</svg>
